<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Recipes Lookup</title>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body class="antialiased bg-brand-cream ">
    <div class="flex flex-col min-h-screen">
      <header
        class="px-5 md:px-10 py-5 border-b border-[#F8F4ED] w-full backdrop-blur-xl fixed overflow-x-hidden bg-brand-cream/50 top-0 z-10 tracking-normal mb-5"
      >
        <div class="flex items-center justify-between max-sm:px-3 ">
          <div class="flex flex-col gap-3">
            <div class="flex items-center justify-center gap-2">
              <img
                src="recipes-recipe-svgrepo-com.svg"
                alt=""
                class="w-12.5 max-md:w-10"
              />
              <h1
                class="text-4xl font-extrabold tracking-tight bg-linear-to-r from-[#0047AB] via-[#395ba0] to-[#1B2A4A] bg-clip-text text-transparent text-center max-w-2xl leading-tight max-md:text-xl max-sm:text-[1.2rem] max-sm:font-bold transition-all ease-in-out"
              >
                The Recipes Lookup
              </h1>
            </div>
              <p class="text-sm mx-auto max-md:text-[10px] font-cursive italic font-light text-[#181e25]">Find any recipes you like</p>
          </div>
            <nav class="max-md:hidden mr-5 font-medium">
              <ul class="flex">
              <li><a href="#" class="mr-3">Home</a></li>
              <li><a href="#"class="mr-3" >About</a></li>
              <li><a href="#" class="mr-3">Contact Us</a></li>
              </ul>
            </nav>
        
          <!-- MObile -->
          <div class="md:hidden">
            <button class=" mr-5" id="menu-toggle">
              <svg
                id="menu-icon-open"
                xmlns="http://www.w3.org/2000/svg"
                class="h-7 w-7"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M4 6h16M4 12h16M4 18h16"
                ></path>
              </svg>
              <svg
                id="menu-icon-close"
                xmlns="http://www.w3.org/2000/svg"
                class="h-7 w-7 hidden"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M6 18L18 6M6 6l12 12"
                ></path>
              </svg>
            </button>
            <!-- MOBILE MENU -->
             </div>
          </div>
          <div id="mobile-menu" class="md:hidden hidden border border-amber-50 rounded-xl bg-[#E8E1D4] mt-3 p-3">
            <nav class="block ">
              <ul>
              <li><a href="#" class="block space-y-1.5">Home</a></li>
          <li><a href="#" class="block space-y-1.5">About</a></li>
              <li><a href="#" class="block space-y-1.5">Contact Us</a></li>
              </ul>
            </nav>
          </div>
        
      </header>

      <main class=" relative mt-20 flex-1  pt-10 gap-12 lg:py-15 lg:px-8 px-5">
        <!-- Input Section -->
        <section class="flex mt-5">
          <div class="flex flex-col justify-center items-center mx-auto gap-2">
            <p class="text-2xl font-mono max-md:text-xl">
              Search Any Recipes.......
            </p>

            <form action="" class="flex mx-auto max-md:flex-col gap-2">
              <label for="recipe-name"></label>
              <input
                type="text"
                id="recipeInput"
                name="recipe-name"
                placeholder="Enter any recipe...."
                required
                class="border rounded-xl w-75 md:w-100 h-10 p-2 bg-[#E8E1D4]"
              />
              <button
                type="submit"
                id="searchBtn"
                class="items-center max-md:w-35 max-md:mx-auto ml-2 border bg-[#E8E1D4] px-3 py-1 rounded-full text-xl hover:outline-amber-600 hover:bg-amber-100"
              >
                Search
                <svg
                  class="inline-flex"
                  xmlns="http://www.w3.org/2000/svg"
                  height="24px"
                  viewBox="0 -960 960 960"
                  width="24px"
                  fill="#000000"
                >
                  <path
                    d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"
                  />
                </svg>
              </button>
            </form>
          </div>
        </section>

      
        <section
          class=" justify-center items-center mt-15"
        >
        <div class="text-center" id="status"></div>
          <h2 class="text-2xl font-mono text-center">Favorites Recipes</h2>
          <div class="max-w-4xl mx-auto grid grid-cols-[repeat(auto-fill,minmax(min(15rem,100%),1fr))] gap-4 p-4 justify-center transition-all ease-in" id="favoritesContainer">
            
          </div>

        </section>
        <section>
          <h2 class="text-2xl font-mono text-center" id="result"></h2>
           <div class="max-w-5xl mx-auto grid max-sm:grid-cols-1 grid-cols-[repeat(auto-fit,minmax(min(15rem,100%),1fr))] gap-4 p-4" id="recipesContainer">
           </div>
           
           <div id="recipeContent" class="flex">
           </div>
        </section>
        <section>
          <div id="instruction" class="hidden fixed top-0  w-125 h-full bg-[#C4A264] shadow-[-10px_5px_5px_-2px_rgba(0,0,0,0.16)] z-50 p-5 transition-all ease-in-out right-0 overflow-y-scroll max-sm:w-full">
            </div>
        </section>
      </main>
      <footer class="p-4 mx-auto">
        <div class="hover:outline-amber-300 ">
          <p class="me ">Copyright &copy; <script>document.write(new Date().getFullYear())</script>      <a class="myLink" href="https://github.com/olammii">The Recipe Lookup </a> </p>
        </div>
      </footer>
    </div>
    <script src="app.js"></script>
  </body>
</html>
